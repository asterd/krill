version: "3.9"

services:
  krill:
    container_name: krill
    build:
      context: ../..
      dockerfile: Dockerfile
    image: krill:local
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    env_file:
      - ../../.env
    volumes:
      - ../../krill.yaml:/krill.yaml:ro
